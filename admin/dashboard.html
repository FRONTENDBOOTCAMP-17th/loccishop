<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocciShop Admin</title>
    <link rel="stylesheet" href="/src/styles/style.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap");

      /* JS innerHTML 동적 클래스 — Tailwind safelist로 처리되나 fallback으로 여기도 정의 */

      /* ── 레이아웃 ── */
      .tab-panel {
        display: none;
      }
      .tab-panel.active {
        display: block;
      }
      .modal-overlay.hidden {
        display: none !important;
      }
      .hidden {
        display: none !important;
      }

      /* ── 테이블 ── */
      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        table-layout: fixed;
      }
      .data-table th {
        padding: 11px 14px;
        text-align: left;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6b5f52;
        background: #faf7f3;
        border-bottom: 1px solid #e8e0d6;
        white-space: nowrap;
      }
      .data-table td {
        padding: 12px 14px;
        border-bottom: 1px solid #f0ebe4;
        vertical-align: middle;
        color: #2a2018;
      }
      .data-table tr:last-child td {
        border-bottom: none;
      }
      .data-table tr:hover td {
        background: #faf7f3;
      }
      .td-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .td-actions {
        display: flex;
        gap: 6px;
        white-space: nowrap;
      }

      /* ── 버튼 ── */
      .btn {
        padding: 8px 18px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        border: none;
        transition: all 0.15s;
      }
      .btn-primary {
        background: #3d4a2e;
        color: #fff;
      }
      .btn-primary:hover {
        background: #4d5c3a;
      }
      .btn-secondary {
        background: #fff;
        color: #2a2018;
        border: 1px solid #d4c9bc;
      }
      .btn-secondary:hover {
        border-color: #8a7a6a;
      }

      .btn-sm {
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
        border: 1px solid #d4c9bc;
        background: #fff;
        color: #2a2018;
        transition: all 0.15s;
      }
      .btn-sm:hover {
        border-color: #8a7a6a;
      }
      .btn-edit {
        border-color: #a8956a;
        color: #7a6440;
      }
      .btn-edit:hover {
        background: #7a6440;
        color: #fff;
        border-color: #7a6440;
      }
      .btn-delete {
        border-color: #d4a8a0;
        color: #b5412a;
      }
      .btn-delete:hover {
        background: #b5412a;
        color: #fff;
        border-color: #b5412a;
      }
      .btn-add-url {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 6px 12px;
        font-size: 12px;
        background: none;
        border: 1px dashed #d4c9bc;
        color: #8a7a6a;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-add-url:hover {
        border-color: #3d4a2e;
        color: #3d4a2e;
      }

      /* ── 검색 ── */
      .search-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
      }
      .search-input {
        padding: 8px 12px;
        border: 1px solid #d4c9bc;
        font-size: 13px;
        width: 280px;
        outline: none;
        background: #fff;
        color: #2a2018;
      }
      .search-input:focus {
        border-color: #3d4a2e;
      }
      .search-select {
        padding: 8px 12px;
        border: 1px solid #d4c9bc;
        font-size: 13px;
        outline: none;
        background: #fff;
        color: #2a2018;
      }

      /* ── 섹션 헤더 ── */
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      .section-title {
        font-size: 18px;
        font-weight: 600;
        color: #2a2018;
        font-family: "Cormorant Garamond", serif;
      }

      /* ── 테이블 래퍼 ── */
      .table-wrap {
        background: #fff;
        border: 1px solid #e8e0d6;
        overflow-x: auto;
      }

      /* ── 페이지네이션 ── */
      .pagination {
        display: flex;
        gap: 6px;
        margin-top: 16px;
      }
      .page-btn {
        padding: 6px 12px;
        font-size: 12px;
        border: 1px solid #d4c9bc;
        background: #fff;
        cursor: pointer;
        transition: all 0.15s;
        color: #2a2018;
      }
      .page-btn:hover,
      .page-btn.active {
        background: #3d4a2e;
        color: #fff;
        border-color: #3d4a2e;
      }

      /* ── 모달 ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(42, 32, 24, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
      }
      .modal {
        background: #fff;
        width: 100%;
        max-width: 560px;
        max-height: 90vh;
        overflow-y: auto;
        border: 1px solid #e8e0d6;
      }
      .modal-lg {
        max-width: 680px;
      }
      .modal-xl {
        max-width: 740px;
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 24px;
        border-bottom: 1px solid #e8e0d6;
      }
      .modal-header h3 {
        font-size: 15px;
        font-weight: 600;
        color: #2a2018;
        font-family: "Cormorant Garamond", serif;
      }
      .modal-close {
        background: none;
        border: none;
        font-size: 16px;
        cursor: pointer;
        color: #8a7a6a;
        padding: 4px;
      }
      .modal-body {
        padding: 24px;
      }
      .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        padding: 16px 24px;
        border-top: 1px solid #e8e0d6;
      }

      /* ── 폼 ── */
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .form-group.full {
        grid-column: 1 / -1;
      }
      .form-group label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6b5f52;
      }
      .form-input {
        padding: 9px 12px;
        border: 1px solid #d4c9bc;
        font-size: 13px;
        color: #2a2018;
        outline: none;
        transition: border-color 0.2s;
        width: 100%;
        font-family: inherit;
        background: #fff;
      }
      .form-input:focus {
        border-color: #3d4a2e;
      }
      textarea.form-input {
        resize: vertical;
      }
      .mt-2 {
        margin-top: 8px;
      }

      /* ── 탭 ── */
      .tab-nav {
        display: flex;
        border-bottom: 1px solid #e8e0d6;
        margin-bottom: 24px;
      }
      .tab-btn {
        padding: 10px 20px;
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border: none;
        background: none;
        cursor: pointer;
        color: #8a7a6a;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        transition: all 0.15s;
      }
      .tab-btn:hover {
        color: #2a2018;
      }
      .tab-btn.active {
        color: #3d4a2e;
        border-bottom-color: #3d4a2e;
        font-weight: 700;
      }

      /* ── URL 목록 ── */
      .url-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .url-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        background: #faf7f3;
        border: 1px solid #e8e0d6;
        font-size: 12px;
      }
      .url-text {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #6b5f52;
      }
      .url-remove {
        background: none;
        border: none;
        cursor: pointer;
        color: #b5412a;
        font-size: 12px;
        flex-shrink: 0;
      }

      /* ── 이미지 프리뷰 ── */
      .image-preview {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .image-preview img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border: 1px solid #e8e0d6;
      }

      /* ── 주요 성분 ── */
      .key-ingredient-item {
        display: grid;
        grid-template-columns: 1fr 2fr auto;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }

      /* ── 뱃지 ── */
      .badge {
        display: inline-block;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
      }
      .badge-new {
        background: #e8f0e0;
        color: #3d4a2e;
      }
      .badge-best {
        background: #f5ede0;
        color: #8a5a28;
      }
      .badge-sale {
        background: #f5e8e5;
        color: #b5412a;
      }

      /* ── 상태 ── */
      .status {
        display: inline-block;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 500;
      }
      .status-active {
        background: #e8f0e0;
        color: #2d5a1e;
      }
      .status-suspended {
        background: #f5e8e5;
        color: #b5412a;
      }
      .status-withdrawn {
        background: #f0ece8;
        color: #6b5f52;
      }

      /* ── 등급 ── */
      .grade {
        display: inline-block;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
      }
      .grade-bronze {
        background: #f5ede0;
        color: #8a5a28;
      }
      .grade-silver {
        background: #f0ece8;
        color: #5a5250;
      }
      .grade-gold {
        background: #faf0d8;
        color: #8a6a18;
      }
      .grade-vip {
        background: #f0e8f5;
        color: #5a3a7a;
      }

      /* ── 배너 그리드 ── */
      .banner-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }
      .banner-card {
        background: #fff;
        border: 1px solid #e8e0d6;
        overflow: hidden;
      }
      .banner-img-wrap {
        height: 140px;
        background: #f2ede6;
        overflow: hidden;
      }
      .banner-img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .banner-info {
        padding: 12px 16px;
      }
      .banner-title {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 4px;
        color: #2a2018;
      }
      .banner-meta {
        font-size: 11px;
        color: #8a7a6a;
      }
      .banner-actions {
        display: flex;
        gap: 8px;
        padding: 0 16px 12px;
      }

      /* ── 리추얼 ── */
      .ritual-card {
        background: #fff;
        border: 1px solid #e8e0d6;
        padding: 20px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 12px;
      }
      .ritual-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
        color: #2a2018;
      }
      .ritual-desc {
        font-size: 13px;
        color: #6b5f52;
        margin-bottom: 4px;
      }
      .ritual-meta {
        font-size: 11px;
        color: #8a7a6a;
      }
      .ritual-actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }

      /* ── 상세 그리드 ── */
      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .detail-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .detail-item span {
        font-size: 11px;
        color: #8a7a6a;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .detail-item strong {
        font-size: 14px;
        font-weight: 500;
        color: #2a2018;
      }

      /* ── 공통 ── */
      .empty {
        text-align: center;
        padding: 48px;
        color: #8a7a6a;
        font-size: 13px;
      }
      code {
        background: #f2ede6;
        padding: 2px 6px;
        font-size: 12px;
        font-family: monospace;
        color: #6b5f52;
      }

      /* ── 네비 active ── */
      .nav-item.active {
        border-left: 3px solid #c8b89a !important;
        background: rgba(255, 255, 255, 0.1) !important;
        color: white !important;
      }
    </style>
  </head>
  <body class="bg-[#f2ede6] text-[#2a2018] text-sm flex min-h-screen">
    <!-- 사이드바 -->
    <aside
      class="w-[220px] bg-[#2a2018] flex flex-col fixed top-0 left-0 bottom-0 z-50"
    >
      <div class="px-6 pt-7 pb-5 border-b border-white/[0.08]">
        <p
          class="text-[10px] tracking-[0.3em] uppercase text-[#c8b89a]/60 mb-1"
        >
          LocciShop
        </p>
        <h2
          class="text-base font-semibold text-white"
          style="
            font-family: &quot;Cormorant Garamond&quot;, serif;
            letter-spacing: 0.05em;
          "
        >
          Admin
        </h2>
      </div>

      <nav class="flex-1 py-4 overflow-y-auto">
        <p
          class="text-[10px] tracking-[0.2em] uppercase text-white/25 px-6 pt-4 pb-2"
        >
          데이터 관리
        </p>
        <div
          class="nav-item flex items-center gap-2.5 px-6 py-2.5 text-white/55 cursor-pointer transition-all text-[13px] hover:text-white hover:bg-white/[0.05] border-l-[3px] border-transparent"
          data-section="products"
        >
          <span class="w-[18px] text-center">📦</span> 상품
        </div>
        <div
          class="nav-item flex items-center gap-2.5 px-6 py-2.5 text-white/55 cursor-pointer transition-all text-[13px] hover:text-white hover:bg-white/[0.05] border-l-[3px] border-transparent"
          data-section="categories"
        >
          <span class="w-[18px] text-center">🗂</span> 카테고리
        </div>
        <div
          class="nav-item flex items-center gap-2.5 px-6 py-2.5 text-white/55 cursor-pointer transition-all text-[13px] hover:text-white hover:bg-white/[0.05] border-l-[3px] border-transparent"
          data-section="banners"
        >
          <span class="w-[18px] text-center">🖼</span> 배너
        </div>
        <div
          class="nav-item flex items-center gap-2.5 px-6 py-2.5 text-white/55 cursor-pointer transition-all text-[13px] hover:text-white hover:bg-white/[0.05] border-l-[3px] border-transparent"
          data-section="rituals"
        >
          <span class="w-[18px] text-center">✨</span> 리추얼 세트
        </div>
        <p
          class="text-[10px] tracking-[0.2em] uppercase text-white/25 px-6 pt-4 pb-2"
        >
          회원
        </p>
        <div
          class="nav-item flex items-center gap-2.5 px-6 py-2.5 text-white/55 cursor-pointer transition-all text-[13px] hover:text-white hover:bg-white/[0.05] border-l-[3px] border-transparent"
          data-section="members"
        >
          <span class="w-[18px] text-center">👤</span> 회원 관리
        </div>
      </nav>

      <div class="px-6 py-5 border-t border-white/[0.08]">
        <p class="text-xs text-white/35 mb-2.5" id="admin-name">관리자</p>
        <button
          id="logout-btn"
          class="w-full py-2 text-[11px] tracking-[0.1em] uppercase border border-white/15 text-white/50 bg-transparent cursor-pointer hover:border-white/40 hover:text-white/80 transition-all"
        >
          로그아웃
        </button>
      </div>
    </aside>

    <!-- 메인 -->
    <div class="ml-[220px] flex-1 flex flex-col min-h-screen">
      <div
        class="bg-[#faf7f3] border-b border-[#e8e0d6] px-8 h-14 flex items-center sticky top-0 z-40"
      >
        <span
          class="text-[15px] font-semibold text-[#2a2018]"
          style="font-family: &quot;Cormorant Garamond&quot;, serif"
          id="topbar-title"
          >상품 관리</span
        >
      </div>
      <div class="p-8 flex-1" id="content"></div>
    </div>

    <script type="module">
      import { removeToken, getToken } from "./js/api.js";
      import { renderProductsSection } from "./js/products.js";
      import { renderCategoriesSection } from "./js/categories.js";
      import { renderBannersSection } from "./js/banners.js";
      import { renderRitualsSection } from "./js/rituals.js";
      import { renderMembersSection } from "./js/members.js";

      if (!getToken()) {
        window.location.href = "/admin/index.html";
      }

      const member = JSON.parse(localStorage.getItem("adminMember") ?? "{}");
      document.getElementById("admin-name").textContent =
        member.name ?? "관리자";

      const sectionMap = {
        products: { title: "상품 관리", render: renderProductsSection },
        categories: { title: "카테고리 관리", render: renderCategoriesSection },
        banners: { title: "배너 관리", render: renderBannersSection },
        rituals: { title: "리추얼 세트 관리", render: renderRitualsSection },
        members: { title: "회원 관리", render: renderMembersSection },
      };

      const content = document.getElementById("content");
      const topbarTitle = document.getElementById("topbar-title");

      function navigate(section) {
        document
          .querySelectorAll(".nav-item")
          .forEach((el) => el.classList.remove("active"));
        document
          .querySelector(`[data-section="${section}"]`)
          ?.classList.add("active");
        const { title, render } = sectionMap[section];
        topbarTitle.textContent = title;
        render(content);
      }

      document.querySelectorAll(".nav-item").forEach((item) => {
        item.addEventListener("click", () => navigate(item.dataset.section));
      });

      document.getElementById("logout-btn").addEventListener("click", () => {
        removeToken();
        localStorage.removeItem("adminMember");
        window.location.href = "/admin/index.html";
      });

      navigate("products");
    </script>
  </body>
</html>
