<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocciShop Admin</title>
    <link rel="stylesheet" href="/src/styles/style.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap");
      .font-cormorant {
        font-family: "Cormorant Garamond", serif;
      }
    </style>
  </head>
  <body class="min-h-screen flex bg-[#f2ede6]">
    <!-- 오른쪽 로그인 폼 -->
    <div class="flex-1 flex items-center justify-center px-8">
      <div class="w-full max-w-[400px]">
        <!-- 모바일 로고 -->
        <div class="lg:hidden text-center mb-10">
          <h1 class="font-cormorant text-4xl text-[#3d4a2e] font-light">
            LocciShop
          </h1>
          <p class="text-xs tracking-[0.3em] uppercase text-[#8a7a6a] mt-1">
            Admin Console
          </p>
        </div>

        <p class="text-xs tracking-[0.25em] uppercase text-[#8a7a6a] mb-2">
          관리자 인증
        </p>
        <h2
          class="text-2xl font-semibold text-[#2a2018] mb-8"
          style="font-family: &quot;Cormorant Garamond&quot;, serif"
        >
          로그인
        </h2>

        <div class="mb-5">
          <label
            class="block text-xs tracking-[0.08em] text-[#6b5f52] mb-1.5 uppercase"
            >아이디</label
          >
          <input
            type="text"
            id="username"
            placeholder="관리자 아이디"
            class="w-full px-4 py-3 bg-white border border-[#d4c9bc] text-sm text-[#2a2018] outline-none focus:border-[#3d4a2e] transition-colors placeholder:text-[#b8a898]"
          />
        </div>

        <div class="mb-8">
          <label
            class="block text-xs tracking-[0.08em] text-[#6b5f52] mb-1.5 uppercase"
            >비밀번호</label
          >
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 bg-white border border-[#d4c9bc] text-sm text-[#2a2018] outline-none focus:border-[#3d4a2e] transition-colors placeholder:text-[#b8a898]"
          />
        </div>

        <button
          id="login-btn"
          class="w-full py-3.5 bg-[#3d4a2e] text-white text-xs tracking-[0.2em] uppercase cursor-pointer hover:bg-[#4d5c3a] active:bg-[#2d3820] transition-colors border-none"
        >
          로그인
        </button>

        <p
          id="error-msg"
          class="hidden text-[#b5412a] text-xs mt-4 text-center tracking-wide"
        >
          아이디 또는 비밀번호가 올바르지 않습니다.
        </p>
      </div>
    </div>

    <script>
      const BASE_URL = "https://api.fullstackfamily.com/api/loccishop/v1";

      document
        .getElementById("login-btn")
        .addEventListener("click", async () => {
          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;
          try {
            const res = await fetch(`${BASE_URL}/auth/login`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username, password }),
            });
            const json = await res.json();
            if (!json.success) throw new Error();
            const { accessToken, member } = json.data;
            localStorage.setItem("adminToken", accessToken);
            localStorage.setItem("adminMember", JSON.stringify(member));
            window.location.href = "/admin/dashboard.html";
          } catch {
            document.getElementById("error-msg").classList.remove("hidden");
          }
        });

      document.getElementById("password").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("login-btn").click();
      });

      if (localStorage.getItem("adminToken")) {
        window.location.href = "/admin/dashboard.html";
      }
    </script>
  </body>
</html>
