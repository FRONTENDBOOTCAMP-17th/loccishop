<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>L'OCCITANE EN PROVENCE</title>
    <link rel="stylesheet" href="/src/styles/style.css" />
    <script type="module" src="/src/js/main.js"></script>
  </head>
  <body>
    <div id="header"></div>
    <main>
      <section class="relative w-full h-[80vh] overflow-hidden bg-[#f4f1ea]">
        <video
          src="src/assets/video/Loccitane-main.mp4"
          autoplay
          muted
          loop
          playsinline
          class="absolute inset-0 w-full h-full object-cover"
        ></video>
        <div
          class="absolute inset-0 flex flex-col items-center justify-center text-center"
        >
          <h1
            class="text-white font-serif text-5xl md:text-7xl tracking-[0.2em] uppercase mb-8"
          >
            Amande Sublime
          </h1>
          <a
            href="#"
            class="text-white text-sm border-b border-white pb-1 hover:opacity-70 transition-opacity"
          >
            자세히 보기 >
          </a>
        </div>
      </section>
      <!-- 아몬드 컬렉션 -->
      <section class="py-16 bg-white" aria-labelledby="almond-title">
        <div class="max-w-7xl mx-auto px-6">
          <header class="text-center mb-10">
            <h2 id="almond-title" class="text-2xl font-bold text-gray-900 mb-5">
              아몬드 컬렉션
            </h2>
            <nav
              id="almond-tabs"
              class="flex justify-center gap-2"
              aria-label="아몬드 컬렉션 카테고리 필터"
            ></nav>
          </header>

          <ul id="almond-grid" aria-label="아몬드 컬렉션 상품 목록"></ul>
        </div>
      </section>
      <section class="bg-white py-8" aria-labelledby="category-title">
        <h2 id="category-title" class="sr-only">상품 카테고리</h2>
        <ul
          id="main-category-list"
          class="max-w-7xl mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-x-3 gap-y-9"
          aria-label="카테고리 목록"
        ></ul>
      </section>

      <!-- 확인해보자!!!! -->
      <!-- 추천 제품 (rotating carousel) -->
      <div class="bg-grey-99 py-11 lg:py-36">
        <section
          class="rotating overflow-hidden"
          aria-labelledby="featured-title"
        >
          <!-- 슬라이드 트랙 (JS로 슬라이드 삽입) -->
          <div id="rotating-track" class="flex will-change-transform"></div>

          <!-- 하단 네비게이션 -->
          <div
            class="flex items-center justify-between py-4 border-t border-gray-200 w-[68vw] mx-auto"
          >
            <button
              id="rotating-prev"
              class="flex items-center gap-2 text-gray-500 hover:text-gray-900 transition-colors"
              aria-label="이전 상품"
            >
              <span class="text-xl leading-none">&#8249;</span>
              <span id="rotating-prev-label" class="text-xs"></span>
            </button>
            <span
              id="rotating-counter"
              class="text-xs text-gray-400 tabular-nums"
            ></span>
            <button
              id="rotating-next"
              class="flex items-center gap-2 text-gray-500 hover:text-gray-900 transition-colors"
              aria-label="다음 상품"
            >
              <span id="rotating-next-label" class="text-xs"></span>
              <span class="text-xl leading-none">&#8250;</span>
            </button>
          </div>
        </section>
      </div>

      <!-- 하단부 동영상 -->
      <section class="relative w-full h-[600px] md:h-screen overflow-hidden">
        <video
          autoplay
          muted
          loop
          playsinline
          class="absolute top-0 left-0 w-full h-full object-cover"
        >
          <source
            src="/src/assets/video/Loccitane-refill.mp4"
            type="video/mp4"
          />
        </video>

        <div
          class="absolute inset-0 flex items-end justify-start p-10 md:p-20 bg-black/10"
        >
          <div class="text-white">
            <p class="text-12xl font-medium md:text-xl">
              리필의 새로운 정의: <br />
              지속 가능한 아름다움을 향한 여정
            </p>
            <a
              href="#"
              class="text-white text-sm border-b border-white pb-1 hover:opacity-70 transition-opacity"
            >
              자세히 보기 >
            </a>
          </div>
        </div>
      </section>
    </main>

    <!-- 푸터 마운트 포인트 (JS: renderFooter()로 교체) -->
    <div id="footer"></div>
  </body>
</html>
