<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장바구니 | L'OcciShop</title>
    <script type="module" src="/src/js/main.js"></script>
    <script type="module" src="/src/pages/cart/index.js"></script>
  </head>
  <body>
    <header id="header"></header>
    <main class="min-w-[400px] px-4 py-10 overflow-x-hidden">
      <!-- 진행단계 -->
      <div class="flex items-center justify-center gap-0 mb-10">
        <!-- 장바구니 -->
        <div class="flex flex-col items-center gap-1">
          <div
            class="w-10 h-10 rounded-full border-2 border-woody-brown bg-woody-brown text-white flex items-center justify-center"
          >
            <img
              src="/src/assets/icon/cart.svg"
              alt=""
              class="w-5 h-5 brightness-0 invert"
            />
          </div>
          <span class="text-xs font-bold text-woody-brown">장바구니</span>
        </div>
        <!-- 연결선 -->
        <div class="w-24 lg:w-40 h-px bg-gray-300 mb-4"></div>
        <!-- 배송 -->
        <div class="flex flex-col items-center gap-1">
          <div
            class="w-10 h-10 rounded-full border-2 border-gray-300 text-gray-300 flex items-center justify-center"
          >
            <img
              src="/src/assets/icon/delivery.svg"
              alt=""
              class="w-5 h-5 opacity-30"
            />
          </div>
          <span class="text-xs text-gray-400">배송</span>
        </div>
        <!-- 연결선 -->
        <div class="w-24 lg:w-40 h-px bg-gray-300 mb-4"></div>
        <!-- 결제 -->
        <div class="flex flex-col items-center gap-1">
          <div
            class="w-10 h-10 rounded-full border-2 border-gray-300 text-gray-300 flex items-center justify-center"
          >
            <img
              src="/src/assets/icon/payment.svg"
              alt=""
              class="w-5 h-5 opacity-30"
            />
          </div>
          <span class="text-xs text-gray-400">결제</span>
        </div>
      </div>
      <div class="max-w-[1000px] mx-auto px-4">
        <h1 class="text-xl font-bold mb-6">
          장바구니 <span id="cart-count">0</span>개의 제품
        </h1>
        <div class="flex flex-col lg:flex-row gap-8">
          <!-- 좌측 상품영역 -->
          <section class="flex-1 flex flex-col gap-4">
            <ul id="cart-list" class="flex flex-col flex-1 gap-4">
              <!-- JS로 렌더링 -->
            </ul>
            <!-- 빈 장바구니 -->
            <div
              id="cart-empty"
              class="hidden flex flex-col items-center justify-center py-24 gap-4 text-center"
            >
              <p class="text-base text-zambezi">장바구니가 비어있습니다.</p>
              <a
                href="/src/pages/product/list/index.html"
                class="text-sm underline underline-offset-2 text-woody-brown hover:opacity-70"
                >쇼핑 계속하기</a
              >
            </div>
          </section>
          <!-- 우측 주문 금액 내역 -->
          <section class="lg:w-[340px] flex flex-col gap-4">
            <!-- 쿠폰 -->
            <div class="border border-gray-200 rounded p-4 flex flex-col gap-3">
              <p class="text-sm font-bold">쿠폰 코드가 있으신가요?</p>
              <div class="flex gap-2">
                <input
                  type="text"
                  id="coupon-input"
                  placeholder="쿠폰 코드 입력"
                  class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-woody-brown"
                />
                <button
                  id="coupon-btn"
                  class="px-4 py-2 border border-gray-300 rounded text-sm hover:bg-cararra transition-colors"
                >
                  적용
                </button>
              </div>
            </div>

            <!-- 주문 요약 -->
            <div class="border border-gray-200 rounded p-4 flex flex-col gap-3">
              <div class="flex justify-between text-sm">
                <span>제품</span>
                <span id="summary-product-price">₩0</span>
              </div>
              <div class="flex justify-between text-sm">
                <span>배송비</span>
                <span id="summary-shipping" class="text-blue-500">무료</span>
              </div>
              <div
                class="border-t border-gray-200 pt-3 flex justify-between text-base font-bold"
              >
                <span>총 주문금액</span>
                <span id="summary-total">₩0</span>
              </div>
            </div>

            <!-- 결제 버튼 -->
            <button
              id="checkout-btn"
              class="w-full bg-woody-brown text-white py-4 rounded text-sm font-bold hover:bg-opacity-90 transition-opacity"
            >
              결제 계속하기
            </button>
          </section>
        </div>
      </div>
    </main>
    <footer id="footer"></footer>
  </body>
</html>
