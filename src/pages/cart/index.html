<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장바구니 | L'OcciShop</title>
    <script type="module" src="/src/js/main.js"></script>
    <script type="module" src="/src/pages/cart/index.js"></script>
  </head>
  <body>
    <header id="header"></header>
    <main class="min-w-[400px] px-4 py-10 overflow-x-hidden">
      <div id="step-indicator"></div>
      <div class="max-w-[1000px] mx-auto px-4">
        <h2 class="text-xl font-bold mb-6">
          장바구니 <span id="cart-count">0</span>개의 제품
        </h2>
        <div class="flex flex-col lg:flex-row gap-8">
          <!-- 좌측 상품영역 -->
          <section class="flex-1 flex flex-col gap-4">
            <ul id="cart-list" class="flex flex-col flex-1 gap-4"></ul>
          </section>
          <!-- 우측 주문 금액 내역 -->
          <section
            id="order-summary-section"
            class="lg:w-[340px] flex flex-col gap-4"
          ></section>
        </div>
      </div>
    </main>
    <footer id="footer"></footer>
  </body>
</html>
