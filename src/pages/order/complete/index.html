<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주문 완료 | L'OcciShop</title>
    <script type="module" src="/src/js/main.js"></script>
    <script type="module" src="/src/pages/order/complete/index.js"></script>
  </head>
  <body>
    <header id="header"></header>
    <main class="px-4 py-10 overflow-x-hidden hidden" id="complete-main">
      <div class="max-w-[700px] mx-auto px-4 flex flex-col gap-8">
        <!-- 완료 안내 -->
        <div
          class="flex flex-col items-center gap-3 py-8 border-b border-gray-200"
        >
          <div
            class="w-14 h-14 rounded-full bg-woody-brown flex items-center justify-center"
          >
            <img
              src="/src/assets/icon/check.svg"
              alt=""
              class="w-7 h-7 brightness-0 invert"
            />
          </div>
          <h1 class="text-xl font-bold">주문이 완료되었습니다</h1>
          <p id="order-number" class="text-sm text-zambezi"></p>
        </div>

        <!-- 주문 상세 -->
        <div id="order-detail-section"></div>

        <!-- 버튼 -->
        <div class="flex gap-3">
          <a
            href="/"
            class="flex-1 py-3 border border-gray-300 rounded text-sm text-center font-bold hover:bg-cararra transition-colors"
          >
            쇼핑 계속하기
          </a>
          <a
            href="/src/pages/mypage/index.html?menu=order"
            class="flex-1 py-3 bg-woody-brown text-white rounded text-sm text-center font-bold hover:bg-opacity-90 transition-opacity"
          >
            주문 내역 보기
          </a>
        </div>
      </div>
    </main>
    <footer id="footer"></footer>
  </body>
</html>
