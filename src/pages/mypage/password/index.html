<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 변경 | L'OcciShop</title>
    <script type="module" src="/src/js/main.js"></script>
    <script type="module" src="/src/pages/mypage/password/index.js"></script>
  </head>
  <body>
    <header id="header"></header>
    <main>
      <!-- ── 비밀번호 변경 폼 ─────────────────────────────────────── -->
      <section class="py-14 px-4">
        <div class="w-full max-w-2xl mx-auto">
          <!-- 제목 -->
          <h1
            class="text-[28px] font-semibold text-center text-woody-brown mb-2"
          >
            비밀번호 변경
          </h1>
          <div class="w-8 border-b-2 border-woody-brown mx-auto mb-12"></div>

          <form id="pw-form" class="space-y-6" novalidate>
              <!-- 현재 비밀번호 -->
              <div class="flex flex-col gap-2">
                <label
                  for="current-pw"
                  class="text-[14px] font-medium text-abbey"
                >
                  현재 비밀번호*
                </label>
                <div class="relative">
                  <input
                    type="password"
                    id="current-pw"
                    name="currentPassword"
                    class="bg-grey-99 border border-grey-45 h-12 w-full pl-4 pr-20 text-[14px] focus:outline-none focus:border-woody-brown"
                    required
                  />
                  <!-- 에러 아이콘 (숨김 기본) -->
                  <img
                    id="current-pw-error-icon"
                    src="/src/assets/icon/error.svg"
                    alt="오류"
                    class="hidden absolute right-10 top-1/2 -translate-y-1/2 w-5 h-5"
                  />
                  <!-- 눈 아이콘 -->
                  <button
                    type="button"
                    id="toggle-current-pw"
                    class="absolute right-3 top-1/2 -translate-y-1/2"
                    aria-label="비밀번호 보기"
                  >
                    <img
                      src="/src/assets/icon/passwordEye.svg"
                      alt=""
                      class="w-5 h-5"
                    />
                  </button>
                </div>
                <!-- 에러 메시지 (숨김 기본) -->
                <p
                  id="current-pw-error-msg"
                  class="hidden text-[12px] text-error-red"
                >
                  Current password don't match.
                </p>
              </div>

              <!-- 새 비밀번호 -->
              <div class="flex flex-col gap-2">
                <label for="new-pw" class="text-[14px] font-medium text-abbey">
                  새 비밀번호*
                </label>
                <div class="relative">
                  <input
                    type="password"
                    id="new-pw"
                    name="newPassword"
                    class="bg-grey-99 border border-grey-45 h-12 w-full pl-4 pr-20 text-[14px] focus:outline-none focus:border-woody-brown"
                    required
                  />
                  <img
                    id="new-pw-error-icon"
                    src="/src/assets/icon/error.svg"
                    alt="오류"
                    class="hidden absolute right-10 top-1/2 -translate-y-1/2 w-5 h-5"
                  />
                  <button
                    type="button"
                    id="toggle-new-pw"
                    class="absolute right-3 top-1/2 -translate-y-1/2"
                    aria-label="비밀번호 보기"
                  >
                    <img
                      src="/src/assets/icon/passwordEye.svg"
                      alt=""
                      class="w-5 h-5"
                    />
                  </button>
                </div>
                <!-- 에러 메시지 (숨김 기본) -->
                <p
                  id="new-pw-error-msg"
                  class="hidden text-[12px] text-error-red"
                >
                  New Password
                </p>

                <!-- 비밀번호 안전도 -->
                <div class="mt-1">
                  <div class="flex items-center gap-2 mb-1">
                    <span class="text-[13px] text-abbey">비밀번호 안전도:</span>
                  </div>
                  <!-- 강도 바 -->
                  <div
                    class="w-full bg-gray-200 h-1.5 rounded-full overflow-hidden"
                  >
                    <div
                      id="strength-bar"
                      class="h-1.5 rounded-full w-0 transition-all duration-300"
                    ></div>
                  </div>
                </div>

                <!-- 필수 포함 사항 -->
                <div class="mt-2 space-y-1.5">
                  <p class="text-[13px] font-medium text-abbey">
                    필수 포함 사항:
                  </p>
                  <ul class="space-y-1">
                    <li
                      id="check-length"
                      class="flex items-center gap-1.5 text-[13px] text-gray-400"
                    >
                      <svg
                        class="w-4 h-4 shrink-0"
                        viewBox="0 0 16 16"
                        fill="none"
                      >
                        <polyline
                          points="2,8 6,12 14,4"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                      </svg>
                      최소 8 글자를 입력하세요
                    </li>
                    <li
                      id="check-letter"
                      class="flex items-center gap-1.5 text-[13px] text-gray-400"
                    >
                      <svg
                        class="w-4 h-4 shrink-0"
                        viewBox="0 0 16 16"
                        fill="none"
                      >
                        <polyline
                          points="2,8 6,12 14,4"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                      </svg>
                      최소 1개의 문자를 입력하세요.
                    </li>
                    <li
                      id="check-number"
                      class="flex items-center gap-1.5 text-[13px] text-gray-400"
                    >
                      <svg
                        class="w-4 h-4 shrink-0"
                        viewBox="0 0 16 16"
                        fill="none"
                      >
                        <polyline
                          points="2,8 6,12 14,4"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                      </svg>
                      최소 1개의 숫자를 입력하세요.
                    </li>
                  </ul>
                  <p class="text-[13px] text-abbey">
                    대문자와 소문자, 특수 기호를 함께 사용하시는 것을 권장합니다
                  </p>
                </div>
              </div>

              <!-- 전송하기 버튼 -->
              <button
                type="submit"
                class="bg-woody-brown text-white-solid text-[14px] font-medium px-8 py-3 hover:bg-dark-woody transition-colors"
              >
                전송하기
              </button>
            </form>
        </div>
      </section>
    </main>

    <footer id="footer"></footer>
  </body>
</html>
