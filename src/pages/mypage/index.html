<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마이페이지 | L'OcciShop</title>
    <script type="module" src="/src/js/main.js"></script>
    <script type="module" src="/src/pages/mypage/index.js"></script>
  </head>
  <body class="bg-white-solid text-dark-woody">
    <header id="header"></header>

    <main
      class="max-w-[1280px] min-w-[400px] mx-auto w-full px-4 py-10 sm:px-6 lg:px-10 lg:py-20 flex flex-col lg:flex-row gap-8 lg:gap-20"
    >
      <!-- 모바일 탭: lg 미만에서만 표시 -->
      <nav id="mypage-tab" class="flex border-b border-cararra lg:hidden">
        <button
          data-menu="info"
          class="mypage-tab-btn flex-1 py-3 text-xs text-empress border-b-2 border-transparent transition-colors hover:text-dark-woody"
        >
          내 정보
        </button>
        <button
          data-menu="order"
          class="mypage-tab-btn flex-1 py-3 text-xs text-empress border-b-2 border-transparent transition-colors hover:text-dark-woody"
        >
          주문 내역
        </button>
        <button
          data-menu="wish"
          class="mypage-tab-btn flex-1 py-3 text-xs text-empress border-b-2 border-transparent transition-colors hover:text-dark-woody"
        >
          위시리스트
        </button>
        <button
          data-menu="review"
          class="mypage-tab-btn flex-1 py-3 text-xs text-empress border-b-2 border-transparent transition-colors hover:text-dark-woody"
        >
          내 리뷰
        </button>
      </nav>

      <!-- 사이드바: lg 이상에서만 표시 -->
      <aside class="w-full lg:w-56 lg:flex-shrink-0 hidden lg:block">
        <h2
          class="text-2xl md:text-3xl font-light tracking-tighter mb-8 md:mb-12"
        >
          마이 페이지
        </h2>

        <nav id="mypage-nav" class="flex flex-col gap-2">
          <button
            data-menu="info"
            class="group w-full flex items-center justify-between py-3 text-sm border-b transition-colors text-empress border-cararra/30 hover:text-dark-woody"
          >
            내 정보
            <svg
              class="w-4 h-4 opacity-0 group-hover:opacity-100 transition-opacity"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path d="M9 5l7 7-7 7"></path>
            </svg>
          </button>
          <button
            data-menu="order"
            class="group w-full flex items-center justify-between py-3 text-sm border-b transition-colors text-empress border-cararra/30 hover:text-dark-woody"
          >
            주문 내역
            <svg
              class="w-4 h-4 opacity-0 group-hover:opacity-100 transition-opacity"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path d="M9 5l7 7-7 7"></path>
            </svg>
          </button>
          <button
            data-menu="wish"
            class="group w-full flex items-center justify-between py-3 text-sm border-b transition-colors text-empress border-cararra/30 hover:text-dark-woody"
          >
            위시리스트
            <svg
              class="w-4 h-4 opacity-0 group-hover:opacity-100 transition-opacity"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path d="M9 5l7 7-7 7"></path>
            </svg>
          </button>
          <button
            data-menu="review"
            class="group w-full flex items-center justify-between py-3 text-sm border-b transition-colors text-empress border-cararra/30 hover:text-dark-woody"
          >
            내 리뷰
            <svg
              class="w-4 h-4 opacity-0 group-hover:opacity-100 transition-opacity"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path d="M9 5l7 7-7 7"></path>
            </svg>
          </button>
        </nav>

        <div class="mt-16 md:mt-20">
          <button
            class="text-[11px] text-empress/60 hover:text-ferra tracking-[0.2em] uppercase transition-colors flex items-center gap-2"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              ></path>
            </svg>
            Logout
          </button>
        </div>
      </aside>

      <section id="mypage-content" class="flex-1 min-h-[600px]"></section>
    </main>

    <footer id="footer"></footer>
  </body>
</html>
