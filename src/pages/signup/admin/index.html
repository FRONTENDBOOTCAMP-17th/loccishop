<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>L’OcciShop 클론 프로젝트</title>
    <script type="module" src="/src/js/main.js"></script>
    <script type="module" src="/src/pages/signup/admin/index.js"></script>
  </head>
  <body class="special-page">
    <header id="header"></header>
    <main class="flex justify-center items-center min-w-100">
      <div class="w-161 h-417 px-2 flex flex-col">
        <h2 class="text-[24px] font-normal leading-10 text-center pb-2">
          회원가입
        </h2>
        <hr class="w-12.5 h-0.5 mx-auto" />
        <p class="text-abbey text-[12px] font-medium leading-4 my-6">
          필수항목*
        </p>

        <form id="signupForm" class="flex flex-col">
          <div class="flex flex-col mb-4">
            <label for="userId" class="text-[14px] font-medium leading-5"
              >아이디*</label
            >
            <div class="flex gap-2 my-2 items-center">
              <div class="relative flex-1">
                <input
                  type="text"
                  id="userId"
                  name="userId"
                  class="bg-grey-99 border border-grey-45 h-10 py-2.25 pl-[7.67px] pr-[31.7px] w-full"
                  required
                />
                <img
                  tabindex="-1"
                  src="/src/assets/icon/error.svg"
                  alt="아이디 에러"
                  class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4"
                  id="idErrorIcon"
                />
                <img
                  tabindex="-1"
                  src="/src/assets/icon/check.svg"
                  alt="아이디 통과"
                  class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4"
                  id="idCheckIcon"
                />
              </div>
              <button
                type="button"
                id="checkIdBtn"
                class="h-10 px-4 bg-orange-90 text-[13px] font-medium whitespace-nowrap"
              >
                중복확인
              </button>
            </div>
            <p
              class="text-error-red text-[12px] font-medium leading-4 mb-1"
              id="idErrorText"
            >
              잘못된 형식입니다.
            </p>
            <p
              class="text-error-red text-[12px] font-medium leading-4 mb-4"
              id="idDuplicateText"
            >
              이미 사용 중인 아이디입니다.
            </p>
            <p class="text-[12px] font-medium leading-4" id="idAvailableText">
              사용 가능한 아이디입니다.
            </p>
          </div>

          <div class="flex flex-col">
            <label for="userPw" class="text-[14px] font-medium leading-5"
              >비밀번호*</label
            >
            <div class="relative">
              <input
                type="password"
                id="userPw"
                name="userPw"
                class="bg-grey-99 border border-grey-45 my-2 h-10 py-2.25 pl-[7.67px] pr-[31.7px] w-full"
                required
              />
              <div class="flex absolute right-3 top-1/2 -translate-y-1/2 gap-3">
                <div class="relative w-4 h-4">
                  <img
                    tabindex="-1"
                    src="/src/assets/icon/error.svg"
                    alt="비밀번호 에러"
                    id="pwErrorIcon"
                    class="absolute inset-0 w-full h-full"
                  />
                  <img
                    tabindex="-1"
                    src="/src/assets/icon/check.svg"
                    alt="비밀번호 통과"
                    id="pwCheckIcon"
                    class="absolute inset-0 w-full h-full"
                  />
                </div>
                <button id="togglePassword" type="button">
                  <img
                    tabindex="-1"
                    src="/src/assets/icon/passwordEye.svg"
                    alt="비밀번호 보기"
                  />
                </button>
              </div>
            </div>
            <p
              id="pwGuideText"
              class="text-abbey text-[12px] font-medium leading-4 mb-4"
            >
              영문/숫자/특수문자 포함 8자 이상
            </p>
            <p
              id="pwErrorText"
              class="text-error-red text-[12px] font-medium leading-4 mb-4"
            >
              비밀번호 형식이 올바르지 않습니다.
            </p>
          </div>

          <div class="flex flex-col">
            <label for="userPwConfirm" class="text-[14px] font-medium leading-5"
              >비밀번호 확인*</label
            >
            <div class="relative mb-3">
              <input
                type="password"
                id="userPwConfirm"
                name="userPwConfirm"
                class="bg-grey-99 border border-grey-45 my-2 h-10 py-2.25 pl-[7.67px] pr-[31.7px] w-full"
                required
              />
              <div class="flex absolute right-3 top-1/2 -translate-y-1/2 gap-3">
                <div class="relative w-4 h-4">
                  <img
                    tabindex="-1"
                    src="/src/assets/icon/error.svg"
                    alt="비밀번호 확인 에러"
                    id="pwConfirmErrorIcon"
                    class="absolute inset-0 w-full h-full"
                  />
                  <img
                    tabindex="-1"
                    src="/src/assets/icon/check.svg"
                    alt="비밀번호 확인 통과"
                    id="pwConfirmCheckIcon"
                    class="absolute inset-0 w-full h-full"
                  />
                </div>
                <button id="togglePasswordConfirm" type="button">
                  <img
                    tabindex="-1"
                    src="/src/assets/icon/passwordEye.svg"
                    alt="비밀번호 확인 보기"
                  />
                </button>
              </div>
            </div>
            <p
              id="pwConfirmErrorText"
              class="text-error-red text-[12px] font-medium leading-4 mb-4"
            >
              비밀번호가 일치하지 않습니다.
            </p>
          </div>

          <div class="flex flex-col">
            <label for="userName" class="text-[14px] font-medium leading-5"
              >이름*</label
            >
            <div class="relative mb-3">
              <input
                type="text"
                id="userName"
                name="userName"
                class="bg-grey-99 border border-grey-45 my-2 h-10 py-2.25 pl-[7.67px] pr-[31.7px] w-full"
                required
              />
              <img
                tabindex="-1"
                src="/src/assets/icon/error.svg"
                alt="이름 에러"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4"
                id="nameErrorIcon"
              />
              <img
                tabindex="-1"
                src="/src/assets/icon/check.svg"
                alt="이름 통과"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4"
                id="nameCheckIcon"
              />
            </div>
            <p
              class="text-error-red text-[12px] font-medium leading-4 mb-4"
              id="nameErrorText"
            >
              이름을 입력해주세요.
            </p>
          </div>

          <div class="flex flex-col">
            <label for="userEmail" class="text-[14px] font-medium leading-5"
              >이메일*</label
            >
            <div class="relative mb-3">
              <input
                type="email"
                id="userEmail"
                name="userEmail"
                class="bg-grey-99 border border-grey-45 my-2 h-10 py-2.25 pl-[7.67px] pr-[31.7px] w-full"
                required
              />
              <img
                tabindex="-1"
                src="/src/assets/icon/error.svg"
                alt="이메일 에러"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4"
                id="emailErrorIcon"
              />
              <img
                tabindex="-1"
                src="/src/assets/icon/check.svg"
                alt="이메일 통과"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4"
                id="emailCheckIcon"
              />
            </div>
            <p
              class="text-error-red text-[12px] font-medium leading-4 mb-4"
              id="emailErrorText"
            >
              이메일 형식이 올바르지 않습니다.
            </p>
          </div>

          <div class="flex flex-col mb-3">
            <label for="adminToken" class="text-[14px] font-medium leading-5"
              >인증토큰*</label
            >
            <div class="relative mb-3">
              <input
                type="text"
                id="adminToken"
                name="adminToken"
                class="bg-grey-99 border border-grey-45 my-2 h-10 py-2.25 pl-[7.67px] pr-[31.7px] w-full"
                required
              />
              <img
                tabindex="-1"
                src="/src/assets/icon/error.svg"
                alt="토큰 에러"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4"
                id="tokenErrorIcon"
              />
              <img
                tabindex="-1"
                src="/src/assets/icon/check.svg"
                alt="토큰 인증 성공"
                class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4"
                id="tokenCheckIcon"
              />
            </div>
            <p
              class="text-error-red text-[12px] font-medium leading-4 mb-4"
              id="tokenErrorText"
            >
              인증토큰이 올바르지 않습니다.
            </p>
          </div>

          <div class="flex justify-between items-end gap-2">
            <button type="button" id="backBtn" class="flex-1 py-2 bg-orange-90">
              뒤로 가기
            </button>
            <button type="submit" class="flex-1 py-2 bg-orange-90">확인</button>
          </div>
        </form>
      </div>
    </main>
    <footer id="footer"></footer>
  </body>
</html>
