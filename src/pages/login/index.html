<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>L’OcciShop 클론 프로젝트</title>
    <script type="module" src="/src/js/main.js"></script>
  </head>
  <body>
    <main>
      <div
        id="loginModal"
        class="fixed inset-0 z-50 flex justify-center items-center"
      >
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

        <div class="relative pr-2.5 bg-grey-99 z-10 w-200 h-fit">
          <button class="px-[21.67px] py-[21.67px] absolute right-0">
            <img
              src="/src/assets/icon/login_xBtn.svg"
              alt="로그인/회원가입 창 닫기버튼"
            />
          </button>
          <div
            class="my-[71.99px] w-160 mx-9.25 flex flex-col justify-start items-start"
          >
            <div class="">
              <h1
                class="text-brand-woody text-[30px] font-normal leading-normal mb-2"
              >
                로그인 / 회원가입
              </h1>
              <p class="text-grey-abbey text-[14px] font-normal leading-5">
                필수항목*
              </p>
              <p
                class="pt-10 pb-6 text-brand-woody text-[12px] font-bold leading-4 tracking-[1.2px] uppercase"
              >
                이메일 주소를 입력하세요.
              </p>
              <form action="">
                <div class="px-10 py-4 bg-grey-96 w-181.5 flex flex-col gap-4">
                  <div
                    class="flex flex-col text-grey-abbey text-[14px] font-semibold leading-5"
                  >
                    <label for="email">아이디* </label>
                    <input
                      type="text"
                      id="email"
                      name="user_email"
                      class="bg-grey-99 border border-grey-45 mt-2 h-10"
                      required
                    />
                  </div>
                  <div
                    class="flex flex-col text-grey-abbey text-[14px] font-semibold leading-5"
                  >
                    <label for="password">비밀번호*</label>

                    <div class="relative mt-2 w-full">
                      <input
                        type="password"
                        id="password"
                        class="w-full bg-grey-99 border border-grey-45 h-10 pr-10"
                        required
                      />
                      <button
                        type="button"
                        id="togglePassword"
                        class="absolute right-3 top-1/2 -translate-y-1/2 hidden"
                      >
                        <img
                          src="/src/assets/icon/passwordEye.svg"
                          alt="비밀번호 보기"
                          class="w-5 h-5"
                        />
                      </button>
                    </div>
                  </div>
                  <div class="flex justify-between items-center">
                    <button
                      type="submit"
                      class="w-60 h-10 bg-brand-woody text-white-solid text-[14px] font-medium leading-6 mt-4"
                    >
                      로그인
                    </button>
                    <a href="./signup.html">회원가입</a>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
